<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub da Mega da Virada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
</head>

<body class="bg-slate-900 min-h-screen text-slate-100 font-sans">

    <!-- Navbar -->
    <nav class="bg-slate-800 border-b border-slate-700 p-4 sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fas fa-clover text-green-400 text-2xl"></i>
                <h1 class="text-xl font-bold tracking-wider">MEGA HUB</h1>
            </div>
            <div class="text-sm text-slate-400">
                <span id="live-indicator"
                    class="inline-block w-2 h-2 rounded-full bg-green-500 mr-1 animate-pulse"></span>
                Ao Vivo
            </div>
        </div>
    </nav>

    <div class="container mx-auto p-4 max-w-6xl grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">

        <!-- Coluna Esquerda: Formulário -->
        <div class="lg:col-span-1 space-y-6">
            <!-- Card Gerador -->
            <div class="bg-slate-800 rounded-xl p-6 shadow-lg border border-slate-700">
                <h2 class="text-lg font-semibold mb-4 text-green-400"><i class="fas fa-plus-circle"></i> Novo Jogo</h2>

                <form id="betForm" class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase text-slate-400 mb-1">Temporada</label>
                        <select name="season" id="season"
                            class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:border-green-500 focus:outline-none text-white">
                            <option value="Mega da Virada 2025">Mega da Virada 2025</option>
                            <option value="Mega Sena Regular">Mega Sena Regular</option>
                            <option value="Verão 2025">Verão 2025</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs uppercase text-slate-400 mb-1">Seu Nickname</label>
                        <input type="text" name="nickname" id="nickname" required placeholder="Ex: DanielBoludo"
                            class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:border-green-500 focus:outline-none text-white">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-xs uppercase text-slate-400 mb-1">Dezenas (6-20)</label>
                            <input type="number" name="qtd" id="qtd" value="6" min="6" max="20"
                                class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:border-green-500 focus:outline-none">
                        </div>
                        <div>
                            <label class="block text-xs uppercase text-slate-400 mb-1">Custo Est.</label>
                            <div id="costDisplay" class="py-2 text-green-400 font-bold">R$ 6.00</div>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs uppercase text-slate-400 mb-1">Números Fixos (Opcional)</label>
                        <input type="text" name="fixos" placeholder="Ex: 7, 13, 50 ou 7 13 50"
                            class="w-full bg-slate-900 border border-slate-700 rounded p-2 focus:border-green-500 focus:outline-none text-sm">
                        <p class="text-xs text-slate-500 mt-1">Separe por vírgula ou espaço. O resto será aleatório.</p>
                    </div>

                    <button type="submit"
                        class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded transition-all transform hover:scale-105">
                        <i class="fas fa-dice"></i> Gerar e Apostar
                    </button>
                </form>
            </div>

            <!-- Stats Rápidos -->
            <div class="bg-slate-800 rounded-xl p-6 shadow-lg border border-slate-700">
                <h3 class="text-sm font-semibold text-slate-400 mb-3 uppercase">Estatísticas do Grupo</h3>
                <div class="flex justify-between items-center mb-2">
                    <span>Total Apostado:</span>
                    <span id="totalMoney" class="text-xl font-bold text-green-400">R$ 0.00</span>
                </div>
                <div class="flex justify-between items-center">
                    <span>Jogos Feitos:</span>
                    <span id="totalGames" class="text-xl font-bold text-blue-400">0</span>
                </div>

                <div class="mt-4 pt-4 border-t border-slate-700">
                    <p class="text-xs text-slate-500 mb-2">NÚMEROS MAIS JOGADOS:</p>
                    <div id="hotNumbers" class="flex flex-wrap gap-2">
                        <!-- Preenchido via JS -->
                    </div>
                </div>
            </div>
        </div>

        <!-- Coluna Direita: Feed de Apostas -->
        <div class="lg:col-span-2">
            <div class="bg-slate-800 rounded-xl shadow-lg border border-slate-700 flex flex-col h-[600px]">
                <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                    <h2 class="font-semibold text-slate-200"><i class="fas fa-stream"></i> Apostas Recentes</h2>
                    <div class="flex gap-2 items-center">
                        <select id="seasonFilter"
                            class="bg-slate-900 border border-slate-700 rounded px-2 py-1 text-xs text-white">
                            <option value="">Todas as temporadas</option>
                        </select>
                        <button onclick="fetchData()" class="text-slate-400 hover:text-white"><i
                                class="fas fa-sync-alt"></i></button>
                    </div>
                </div>

                <div id="feed" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar">
                    <!-- Cards de Aposta via JS -->
                    <div class="text-center text-slate-500 mt-10">Carregando apostas...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- User History Modal -->
    <div id="userModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-slate-800 rounded-xl max-w-4xl w-full max-h-[90vh] overflow-hidden">
            <div class="p-4 border-b border-slate-700 flex justify-between items-center">
                <h2 id="modalTitle" class="text-lg font-bold text-white">Histórico do Usuário</h2>
                <button onclick="closeUserModal()" class="text-slate-400 hover:text-white">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="modalContent" class="p-4 max-h-[70vh] overflow-y-auto">
                <!-- Content loaded via JS -->
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="script.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #1e293b;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        .bg-slate-750 {
            background-color: #253146;
        }
    </style>
</body>

</html>
